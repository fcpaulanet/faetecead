<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  overflow:hidden;
  background:transparent;
}

.slider{
  width:100%;
  height:350px;
  overflow:hidden;
}

.track{
  display:flex;
  gap:20px;
  width:max-content;
  animation:slide 20s linear infinite;
}

.card{
  width:320px;
  height:320px;
  border-radius:18px;
  overflow:hidden;
  background:white;
  flex-shrink:0;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.card img{
  width:100%;
  height:100%;
  object-fit:contain;
}

@keyframes slide{
  from{
    transform:translateX(0);
  }

  to{
    transform:translateX(-50%);
  }
}
</style>
</head>

<body>

<div class="slider">

<div class="track">

<div class="card">
<img src="https://ead.faetec.rj.gov.br/cursos/draftfile.php/14/user/draft/650600901/Arduino.png">
</div>

<div class="card">
<img src="https://ead.faetec.rj.gov.br/cursos/draftfile.php/14/user/draft/650600901/prod_ed_video%20%281%29.jpeg">
</div>

<div class="card">
<img src="https://ead.faetec.rj.gov.br/cursos/draftfile.php/14/user/draft/650600901/Arduino.png">
</div>

<div class="card">
<img src="https://ead.faetec.rj.gov.br/cursos/draftfile.php/14/user/draft/650600901/prod_ed_video%20%281%29.jpeg">
</div>


</div>

</div>

</body>
</html>
